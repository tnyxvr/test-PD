<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference Room - Dunder Mifflin</title>
  <link rel="icon" href="https://static.wikia.nocookie.net/theoffice/images/6/69/Dunder_Mifflin%2C_Inc.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      background: #f4f1ea;
      color: #333;
      display: block;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #1b2a49;
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .container {
      margin-top: 140px;
      padding: 20px;
      background: #fff;
      border: 4px double #1b2a49;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      max-width: 800px;
      text-align: center;
      margin-left: auto;
      margin-right: auto;
    }

    .quote-container {
      margin-top: 30px;
      font-size: 18px;
      color: #555;
      padding: 20px;
      border: 1px solid #1b2a49;
      background: #f4f1ea;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .quote-container:hover {
      background-color: #e0dbd3;
    }

    .quote-container p {
      margin: 0;
      line-height: 1.6;
    }

    .action-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      background-color: #1b2a49;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: #3b4b7a;
    }

    .btn-primary {
      background-color: #d13a3a; /* A nice red accent for the CTA */
    }

    .btn-primary:hover {
      background-color: #a32b2b;
    }

    /* Modal Styles */
    .modal {
      display: none; /* Hidden by default */
      position: fixed; /* Stay in place */
      z-index: 2000; /* Sit on top of the header */
      left: 0;
      top: 0;
      width: 100%; /* Full width */
      height: 100%; /* Full height */
      overflow: auto; /* Enable scroll if needed */
      background-color: rgba(0,0,0,0.7); /* Black w/ opacity */
    }

    .modal-content {
      background-color: #f4f1ea;
      margin: 10% auto; /* 10% from the top and centered */
      padding: 30px 20px;
      border: 4px double #1b2a49;
      max-width: 600px;
      width: 90%;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .close-btn {
      color: #1b2a49;
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close-btn:hover,
    .close-btn:focus {
      color: #d13a3a;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to the Conference Room</h1>
  </header>

  <div class="container">
    <h2>Michael Scott Quotes</h2>

    <div class="quote-container" id="quoteBox" onclick="nextQuote()">
      <p id="quoteText">"I am Beyoncé, always."</p>
    </div>

    <div class="action-buttons">
      <a href="index.html" class="btn">Back to Dunder Mifflin Home</a>
      <button onclick="openModal()" class="btn btn-primary">Click me</button>
    </div>
  </div>

  <div id="formModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      
      <div class="pipedriveWebForms" data-pd-webforms="https://webforms.pipedrive.com/f/c5erfAaIIsWI4P8m1CejiP00xYrJS34UafYOz6EPgGg0lFpPUAmlQmlqX0iY3b2OXx">
        <script src="https://webforms.pipedrive.com/f/loader"></script>
      </div>

    </div>
  </div>

  <script>
    const quotes = [
      "I am Beyoncé, always.",
      "I'm not superstitious, but I am a little stitious.",
      "I'm an early bird and a night owl. So I'm wise and I have worms.",
      "I… Declare…. Bankruptcy!",
      "Would I rather be feared or loved? Easy. Both. I want people to be afraid of how much they love me.",
      "You cheated on me?....When I specifically asked you not to?",
      "Wikipedia is the best thing ever. Anyone in the world can write anything they want about any subject so you know you are getting the best possible information.",
      "I am running away from my responsibilities, and it feels good.",
      "Sometimes I'll start a sentence, and I don't even know where it's going. I just hope I find it along the way.",
      "And I knew exactly what to do. But in a much more real sense, I had no idea what to do."
    ];

    let currentQuoteIndex = 0;

    function nextQuote() {
      currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
      document.getElementById('quoteText').innerText = quotes[currentQuoteIndex];
    }

    // Modal Logic
    const modal = document.getElementById("formModal");

    function openModal() {
      modal.style.display = "block";
    }

    function closeModal() {
      modal.style.display = "none";
    }

    // Close modal if the user clicks anywhere outside of the modal content
    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>
</body>
</html>
